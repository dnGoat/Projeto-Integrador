<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atributos Globais</title>
</head>
<body>
    <h1>Atributos Globais</h1>

    <!-- id - Identificador Único -->
    <p id="mensagem">Olá, mundo</p>

    <!-- class (clase) - Permite agrupar vários elementos com o mesmo estilo e comportamento-->
    <p> class="Destaque"> Texto importante</p>
    <p> class="Destaque"> Outro texto importante</p>
    
</body>
</html>
