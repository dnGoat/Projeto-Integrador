<!DOCTYPE html>
<html lang="pt.Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos da tabela</title>
</head>
<body>
    <h1>Elementos de Tabela</h1>
    <p>Os elementos de tabela em HTML são usados para organizar dados em linhas e colunas, como uma planinha.
    </p>


    <table border="2">
        <caption>Tabela de Produtos</caption>
        <thead>
            <tr>
                <th>Produtos</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Teclado</td>
                <td>R$ 80,00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>R$ 80,00</td>
            </tr>
        </tfoot>
    </table>

    <!-- table = Define uma tabela -->
    <!-- tr = (Table Row) Define uma linha-->
    <!-- th = (Table Header) Define uma celula de cabeçalho-->
    <!-- td = (Table Data) Define uma celula comum -->
    <!-- thead, tbody, tfoot = Estrutura Semantica da tabela-->

</body>
</html>
