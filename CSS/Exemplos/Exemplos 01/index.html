<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 01: Hello Word</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap');
        body {
            /* Ativar o flexbox para o alinhamento */
            display: flex;

            /* Centraliza horizontalmente o conteúdo  */
            justify-content: center;

            /* Centraliza verticalmente o conteúdo */
            align-items: center;

            /* Define altura como 100% da altura da tela */
            height: 100vh;

            /* Cor de fundo zinza claro  */
            background-color: #165d5b56;
        }

        /* Estilos aplicados ao titulo (h1) */
        h1 {
            /* cor do texto */
            color: #2c7be5;

            /* Tamanho da fonte (3 vezes o tamanho padrão) */
            font-size: 5rem;

            /* Barra azul ao redor do texto  */
            border: 8px solid transparent;

            /* Espaçamento interno (topo/baixo = 20px, Lados = 40px) */
            padding: 20px 40px;

            /* Arrendodamento das bordas  */
            border-radius: 50%;

            border: 35px solid transparent;
            font-size: 50px;
            background-color: rgba(150, 215, 255, 0);
            border-image: url("https://www.mixvale.com.br/wp-content/uploads/2025/08/Lionel-Messi-1.jpg.avif") 150 round;

            /* Fundo branco para destacar o texto  */
            background-color: #ffffff00;

        }
    </style>
</head>
<body>
    <h1>@carloswkj</h1>
</body>
</html>
